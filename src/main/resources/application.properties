# Disable everything that prints text to the terminal
spring.main.banner-mode=off
spring.main.web-application-type=none
logging.level.root=ERROR

# Enable the MCP server
spring.ai.mcp.server.enabled=true
spring.ai.mcp.server.transport=stdio

# Explicitly enable only the capabilities we are using
spring.ai.mcp.server.capabilities.tool=true
spring.ai.mcp.server.capabilities.resource=false
spring.ai.mcp.server.capabilities.prompt=false

spring.ai.mcp.server.instructions=This server provides high-performance Java code analysis and system status tools.

# Note: If you aren't using a specific AI feature in the Java app,
# you don't need a Google API key here; the CLI handles the "Brain" part.